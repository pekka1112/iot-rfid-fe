    <rect x="45" y="35" width="6" height="6" fill="#e74c3c"/>
    
    <rect x="25" y="45" width="6" height="6" fill="#e74c3c"/>
    <rect x="35" y="45" width="6" height="6" fill="#e74c3c"/>
    <rect x="45" y="45" width="6" height="6" fill="#e74c3c"/>
    
